<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            padding: 0%;
            margin: 0%;
        }

        html,
        body {
            height: 100%;
            width: 100%;
        }

        .full-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #333;
            color: white;
        }

        .link-holder {
            position: relative;
            display: flex;
            justify-content: center;
            /* gap: .5rem; */
        }

        .link {
            color: white;
            text-decoration: none;
            padding: 0.5rem 2rem;
            /* border-radius: 3.75rem; */
            /* background-color: rgba(255, 255, 255, 0.303); */
            transition: all 0.5s;

        }

        .link:hover {
            anchor-name: --link-bg;
        }

        .link-holder:has(.link:hover) .anchor-data {
            opacity: 1;
            top: anchor(top);
            bottom: anchor(bottom);
            left: anchor(left);
            right: anchor(right);
        }

        .anchor-data {
            position: absolute;
            position-anchor: --link-bg;
            inset: 0;
            background-color: black;
            border-radius: 3.75rem;
            transition: all 0.5s;
            pointer-events: none;
            opacity: 0;
        }

        p {
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="full-container">
        <div class="link-holder">
            <div class="anchor-data"></div>
            <a href="" class="link">
                <p>Home</p>
            </a>
            <a href="" class="link">
                <p>Aout</p>
            </a>
            <a href="" class="link">
                <p>Contact</p>
            </a>
            <a href="" class="link">
                <p>Career</p>
            </a>
            <a href="" class="link">
                <p>Profile</p>
            </a>
        </div>
    </div>
</body>

</html>
